; VulnCast — on-device firmware for the LilyGo T5 4.7" E-Paper S3 V2.4
; (LilyGo internal name "Screen-4.7-S3-V2.4"). All logic runs on the device:
; it fetches per-channel Vulners vulnerability feeds directly over HTTPS and
; renders them across an interactive touch e-paper UI.

[platformio]
default_envs = vulncast

[env:vulncast]
; pioarduino platform = latest Arduino-ESP32 3.x / ESP-IDF 5.5 (the official platform-espressif32
; lags at Arduino 2.x / IDF 4.4, which lacks driver/i2c_master.h that epdiy 2.0 requires).
; 55.03.39 = Arduino 3.3.9 / ESP-IDF 5.5.4 (latest pioarduino release as of 2026-07).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino

; Use LilyGo's own board definition (boards/T5-ePaper-S3.json), tuned for the
; exact module ESP32-S3-WROOM-1-N16R8: 16MB QIO flash @80MHz, 8MB OPI PSRAM,
; 240 MHz, dual-app OTA partitions (default_16MB.csv), USB CDC+JTAG (USB_MODE=1),
; -DBOARD_HAS_PSRAM. Do not re-declare those here — the board JSON owns them.
board = T5-ePaper-S3

monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder, default

; Generate include/secrets.h from secrets.yaml before every build (never committed).
extra_scripts = pre:scripts/gen_secrets.py

; Only firmware-specific flags live here; the platform/memory tuning is in the board JSON.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1          ; Serial over native USB (not set by the board)
    -DCORE_DEBUG_LEVEL=1
    -DVULNCAST_FW_VERSION=\"1.0.2\"      ; (BOARD_HAS_PSRAM is owned by the board JSON, not re-declared here)

lib_deps =
    Wire
    bitbank2/FastEPD@^2.2.0              ; modern parallel-eink driver (drives our V2.4 shift-register board)
    https://github.com/vroland/epdiy.git#8781397a7154a19fc1b458dbef2aa465ab03cb10 ; epdiy 2.0.0 pinned (rasterizer only: fonts + fb primitives)
    lewisxhe/SensorLib@^0.4.1
    bblanchon/ArduinoJson@^7.4.2
    lennarthennigs/Button2@^2.3.2
    ricmoo/QRCode@^0.0.1
